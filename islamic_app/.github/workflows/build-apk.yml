name: Build Islamic App APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # يسمح بالتشغيل اليدوي

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      # 1. استنساخ الكود
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. تثبيت Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تثبيت Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      # 4. تحميل الخطوط العربية تلقائياً
      - name: Download Arabic Fonts
        run: |
          mkdir -p assets/fonts
          # Amiri Font
          wget -q "https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf" -O assets/fonts/Amiri-Regular.ttf
          wget -q "https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Bold.ttf" -O assets/fonts/Amiri-Bold.ttf
          # Scheherazade New
          wget -q "https://github.com/google/fonts/raw/main/ofl/scheherazadenew/ScheherazadeNew-Regular.ttf" -O assets/fonts/ScheherazadeNew-Regular.ttf
          wget -q "https://github.com/google/fonts/raw/main/ofl/scheherazadenew/ScheherazadeNew-Bold.ttf" -O assets/fonts/ScheherazadeNew-Bold.ttf
          # Uthmanic (fallback to Amiri if not available)
          cp assets/fonts/Amiri-Regular.ttf assets/fonts/UthmanicHafs.ttf
          echo "✅ Fonts downloaded"
          ls assets/fonts/

      # 5. إنشاء assets فارغة
      - name: Create Asset Directories
        run: |
          mkdir -p assets/images assets/audio assets/data
          touch assets/images/.gitkeep
          touch assets/audio/.gitkeep
          touch assets/data/.gitkeep
          echo "✅ Assets created"

      # 6. تثبيت الحزم
      - name: Install Dependencies
        run: flutter pub get

      # 7. توليد الكود (Hive)
      - name: Generate Code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # 8. فحص الكود
      - name: Analyze Code
        run: flutter analyze --no-fatal-infos || true

      # 9. بناء APK
      - name: Build APK (Release)
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm,android-arm64 \
            --split-per-abi
        
      # 10. بناء APK Universal (يعمل على كل الأجهزة)
      - name: Build Universal APK
        run: |
          flutter build apk \
            --release \
            --no-split-per-abi

      # 11. رفع الـ APK كـ Artifact
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: islamic-app-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      # 12. إنشاء Release تلقائي
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "نور الإسلام v1.0.${{ github.run_number }}"
          body: |
            ## 🌙 نور الإسلام - Islamic App
            
            ### تحميل APK:
            - **app-release.apk** → يعمل على كل الأجهزة ✅
            - **app-arm64-v8a-release.apk** → أجهزة 64-bit (أسرع)
            - **app-armeabi-v7a-release.apk** → أجهزة 32-bit
            
            ### المميزات:
            - 📖 القرآن الكريم كامل
            - 📿 الأذكار والأدعية
            - 🔁 السبحة الرقمية
            - ⏰ تذكيرات إسلامية
            - 🌙 وضع ليلي/نهاري
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
