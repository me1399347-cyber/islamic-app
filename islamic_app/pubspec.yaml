name: islamic_app
description: تطبيق إسلامي متكامل - القرآن والأذكار والأدعية
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Audio Player
  just_audio: ^0.9.36

  # HTTP & Connectivity
  http: ^1.1.0
  connectivity_plus: ^5.0.1

  # Notifications & Background
  flutter_local_notifications: ^16.1.0
  workmanager: ^0.5.1
  timezone: ^0.9.2

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

  # Vibration
  vibration: ^1.8.4

  # Storage
  shared_preferences: ^2.2.2

  # Utilities
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  rxdart: ^0.27.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/data/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700

    - family: Scheherazade
      fonts:
        - asset: assets/fonts/ScheherazadeNew-Regular.ttf
        - asset: assets/fonts/ScheherazadeNew-Bold.ttf
          weight: 700

    - family: Uthmanic
      fonts:
        - asset: assets/fonts/UthmanicHafs.ttf
